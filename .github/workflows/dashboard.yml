name: Dashboard Build
on:
  push:
    branches: [ main, dev ]
    paths:
      - 'dependency-analyser-dashboard/**'
      - '.github/workflows/dashboard.yml'
  pull_request:
    paths:
      - 'dependency-analyser-dashboard/**'
      - '.github/workflows/dashboard.yml'

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dependency-analyser-dashboard
    steps:

      - name: Fetch Sources
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dependency-analyser-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
